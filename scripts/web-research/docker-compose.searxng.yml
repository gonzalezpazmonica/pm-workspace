version: '3.8'

services:
  searxng:
    image: searxng/searxng:latest
    container_name: savia-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8888:8080"
    environment:
      - SEARXNG_BASE_URL=http://localhost:8888/
    volumes:
      - searxng-data:/etc/searxng
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    labels:
      - "pm-workspace.component=web-research"
      - "pm-workspace.version=3.9.0"

volumes:
  searxng-data:
