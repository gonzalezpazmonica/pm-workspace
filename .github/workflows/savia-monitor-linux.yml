name: Savia Monitor — Linux Build

on:
  push:
    paths:
      - 'projects/savia-monitor/**'
      - '.github/workflows/savia-monitor-linux.yml'
  pull_request:
    paths:
      - 'projects/savia-monitor/**'
      - '.github/workflows/savia-monitor-linux.yml'

permissions:
  contents: read

jobs:
  build-linux:
    name: Build Linux bundles (deb + appimage)
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            xvfb

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          # NOTE: no cache because package-lock.json is gitignored in this
          # repo (see .gitignore: **/package-lock.json). Once savia-monitor
          # gets its own whitelisted lockfile we can re-enable npm cache.

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: projects/savia-monitor/src-tauri

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Run build-linux.sh environment check
        run: bash projects/savia-monitor/scripts/build-linux.sh --check

      - name: Install frontend dependencies
        working-directory: projects/savia-monitor
        # npm install (not npm ci) because package-lock.json is gitignored
        run: npm install --no-audit --no-fund

      - name: Rust format check (advisory)
        working-directory: projects/savia-monitor/src-tauri
        # Non-blocking: the existing codebase was not originally formatted
        # with rustfmt, and we are not going to reformat it in this PR.
        # Once someone runs `cargo fmt` locally and commits the result,
        # we can flip this to blocking by removing `continue-on-error`.
        continue-on-error: true
        run: cargo fmt --check

      - name: Rust clippy (advisory)
        working-directory: projects/savia-monitor/src-tauri
        # Non-blocking: legacy clippy warnings would block this PR. Made
        # advisory so the real Linux build can still produce artifacts.
        # Track cleanup as a separate task.
        continue-on-error: true
        run: cargo clippy -- -D warnings

      - name: Rust unit tests
        working-directory: projects/savia-monitor/src-tauri
        run: cargo test

      - name: Build frontend (Vite)
        working-directory: projects/savia-monitor
        run: npm run build

      - name: Build Tauri bundles (deb + appimage)
        working-directory: projects/savia-monitor
        run: cargo tauri build --bundles deb,appimage
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/projects/savia-monitor/src-tauri/target

      - name: Verify bundles exist
        run: |
          BUNDLE_DIR="projects/savia-monitor/src-tauri/target/release/bundle"
          echo "== Artifacts =="
          find "$BUNDLE_DIR" -maxdepth 3 -type f \( -name "*.deb" -o -name "*.AppImage" \) | while read -r f; do
            echo "  $(du -h "$f" | cut -f1)  $f"
          done
          test -n "$(find "$BUNDLE_DIR" -name "*.deb" 2>/dev/null)" || { echo "No .deb produced"; exit 1; }
          test -n "$(find "$BUNDLE_DIR" -name "*.AppImage" 2>/dev/null)" || { echo "No .AppImage produced"; exit 1; }

      - name: Smoke test .deb package metadata
        run: |
          DEB=$(find projects/savia-monitor/src-tauri/target/release/bundle -name "*.deb" | head -1)
          echo "== dpkg-deb info =="
          dpkg-deb --info "$DEB"
          echo "== dpkg-deb contents (head) =="
          dpkg-deb --contents "$DEB" | head -20

      - name: Smoke test .AppImage structure
        run: |
          APPIMAGE=$(find projects/savia-monitor/src-tauri/target/release/bundle -name "*.AppImage" | head -1)
          chmod +x "$APPIMAGE"
          echo "== AppImage size =="
          ls -lh "$APPIMAGE"
          cd /tmp
          "$APPIMAGE" --appimage-extract >/dev/null 2>&1 && ls squashfs-root/ | head -10 || echo "Extract not supported (non-fatal)"

      - name: Upload Linux bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: savia-monitor-linux-${{ github.sha }}
          path: |
            projects/savia-monitor/src-tauri/target/release/bundle/deb/*.deb
            projects/savia-monitor/src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 14
          if-no-files-found: error
