name: Evals CI Gate

# SPEC-151 — Eval regression detection on PR changes to skills/agents/hooks.
# Runs DeepEval suite (pytest) on PRs; red-team (promptfoo) nightly only.
# Uses paired-delta vs frozen baseline (NOT aggregate pass-rate).
# Reference: SPEC-151, paired-delta pattern (DeepEval CI docs + Future AGI 2026).

on:
  pull_request:
    branches: [main]
    paths:
      - ".opencode/skills/**"
      - ".opencode/agents/**"
      - ".opencode/hooks/**"
      - ".claude/skills/**"
      - ".claude/agents/**"
      - ".claude/hooks/**"
  schedule:
    # Nightly at 02:00 UTC — runs promptfoo red-team job
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_redteam:
        description: "Force red-team run"
        type: boolean
        default: false

env:
  SAVIA_EVAL_JUDGE_MODEL: ${{ vars.SAVIA_EVAL_JUDGE_MODEL || 'claude-opus-4-7@20260501' }}
  SAVIA_EVAL_DELTA_THRESHOLD: "0.05"
  PYTHON_VERSION: "3.12"

jobs:
  # ── Job 1: DeepEval skills regression (every PR) ─────────────────────────────
  deepeval-skills:
    name: DeepEval Skills Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install pytest pytest-json-report 2>/dev/null || true
          # DeepEval is optional — if not installed, skip gracefully
          pip install deepeval 2>/dev/null && echo "DEEPEVAL_AVAILABLE=true" >> "$GITHUB_ENV" \
            || echo "DEEPEVAL_AVAILABLE=false" >> "$GITHUB_ENV"

      - name: Run evals suite (pytest)
        id: evals
        run: |
          if [[ "$DEEPEVAL_AVAILABLE" == "false" ]]; then
            echo "::warning::DeepEval not installed — skipping LLM-graded metrics. Running heuristic evals only."
          fi
          python -m pytest tests/evals/ \
            --tb=short \
            -m "evals or not evals" \
            --json-report \
            --json-report-file=tests/evals/results/deepeval-report.json \
            -q \
            || true  # non-zero exit handled by paired-delta below
        env:
          SAVIA_EVAL_JUDGE_MODEL: ${{ env.SAVIA_EVAL_JUDGE_MODEL }}

      - name: Run paired-delta vs baseline
        id: delta
        run: |
          bash scripts/evals-runner.sh --mock --output tests/evals/results/delta-report.json
          cat tests/evals/results/delta-report.json

      - name: Check delta threshold
        run: |
          python3 -c "
          import json, sys
          results = json.loads(open('tests/evals/results/delta-report.json').read())
          failures = [r for r in results if r.get('threshold_pass') is False]
          if failures:
              print('DEGRADATION DETECTED:')
              for f in failures:
                  print(f'  {f[\"dataset\"]}: delta={f[\"delta\"]} (threshold={f.get(\"threshold_used\", 0.05)})')
              sys.exit(1)
          print(f'All {len(results)} datasets within threshold.')
          "

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-results-${{ github.sha }}
          path: tests/evals/results/
          retention-days: 30

      - name: Comment on PR with delta table
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = JSON.parse(fs.readFileSync('tests/evals/results/delta-report.json', 'utf8'));
            } catch (e) {
              console.log('No delta report found, skipping comment.');
              return;
            }

            const rows = report.map(r => {
              const status = r.threshold_pass === false ? '❌ FAIL' : '✅ PASS';
              const delta = r.delta !== null ? (r.delta >= 0 ? `+${r.delta}` : `${r.delta}`) : 'N/A';
              const baseline = r.baseline_score !== null ? r.baseline_score.toFixed(4) : 'N/A';
              const current = r.current_score !== null ? r.current_score.toFixed(4) : 'N/A';
              return `| ${r.dataset} | ${baseline} | ${current} | ${delta} | ${status} |`;
            }).join('\n');

            const body = [
              '## Evals CI Gate — Paired-Delta Report',
              '',
              `Commit: \`${context.sha.substring(0, 8)}\``,
              '',
              '| Dataset | Baseline | Current | Delta | Status |',
              '|---|---|---|---|---|',
              rows,
              '',
              `> Threshold: ${process.env.SAVIA_EVAL_DELTA_THRESHOLD} degradation max. [Artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # ── Job 2: Regenerate baseline on push to main ───────────────────────────────
  regenerate-baseline:
    name: Regenerate Frozen Baseline
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Regenerate baseline
        run: |
          DATE=$(date +%Y-%m-%d)
          SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          BASELINE_DIR="tests/evals/baselines/${DATE}-${SHA}"
          mkdir -p "$BASELINE_DIR"
          bash scripts/evals-runner.sh --mock --output "$BASELINE_DIR/results.json"
          echo "Baseline written to $BASELINE_DIR/results.json"

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: baseline-${{ github.sha }}
          path: tests/evals/baselines/
          retention-days: 90

  # ── Job 3: Promptfoo red-team (nightly only) ─────────────────────────────────
  promptfoo-redteam:
    name: Promptfoo Red-Team (Nightly)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_redteam == true)
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check promptfoo availability
        id: check_promptfoo
        run: |
          if command -v promptfoo &>/dev/null || npx --yes promptfoo --version &>/dev/null 2>&1; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Promptfoo not available — skipping red-team. Install with: npm i -g promptfoo"
          fi

      - name: Run promptfoo red-team
        if: steps.check_promptfoo.outputs.available == 'true'
        run: |
          npx promptfoo eval \
            --config tests/evals/promptfoo.yaml \
            --output tests/evals/results/promptfoo-$(date +%Y%m%d).json \
            || echo "::warning::Promptfoo eval had failures — check results"

      - name: Open issue on red-team regression
        if: failure() && steps.check_promptfoo.outputs.available == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[EVALS] Nightly red-team regression detected ${new Date().toISOString().split('T')[0]}`,
              body: `Promptfoo nightly red-team found a regression.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nSee SPEC-151 for remediation protocol.`,
              labels: ['evals', 'regression', 'automated'],
            });
