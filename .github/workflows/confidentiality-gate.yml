name: Confidentiality Gate

on:
  pull_request:
    branches: [main]
  schedule:
    # Full repo audit every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scan mode'
        required: false
        default: 'full-repo'
        type: choice
        options:
          - full-repo
          - pr

jobs:
  signature-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: Verify Audit Signature
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Debug git state
        run: |
          echo "HEAD: $(git rev-parse HEAD)"
          echo "HEAD short: $(git rev-parse --short HEAD)"
          echo "Branch: $(git rev-parse --abbrev-ref HEAD)"
          echo "GITHUB_BASE_REF: ${GITHUB_BASE_REF:-unset}"
          echo "GITHUB_HEAD_REF: ${GITHUB_HEAD_REF:-unset}"
          echo "origin/main: $(git rev-parse origin/main 2>/dev/null || echo missing)"
          echo "merge-base: $(git merge-base origin/main HEAD 2>/dev/null || echo none)"
          echo "Saved hash: $(grep diff_hash .confidentiality-signature | cut -d= -f2)"
          echo "Computed hash: $(git diff origin/main..HEAD -- . ':!.confidentiality-signature' | sha256sum | awk '{print $1}')"

      - name: Verify confidentiality signature exists and matches
        run: bash scripts/confidentiality-sign.sh verify

  confidentiality-scan-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    name: PII & Confidentiality Scan (PR)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate dynamic blocklist
        run: bash scripts/generate-blocklist.sh > /tmp/dynamic-blocklist.txt

      - name: Run confidentiality scanner on PR diff
        run: bash scripts/confidentiality-scan.sh --pr --blocklist /tmp/dynamic-blocklist.txt

  confidentiality-scan-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    name: Full Repo Confidentiality Audit
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate dynamic blocklist
        run: bash scripts/generate-blocklist.sh > /tmp/dynamic-blocklist.txt

      - name: Run full repo confidentiality scan
        run: bash scripts/confidentiality-scan.sh --full-repo --blocklist /tmp/dynamic-blocklist.txt
