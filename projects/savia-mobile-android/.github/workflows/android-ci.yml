name: Android CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'projects/savia-mobile-android/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'projects/savia-mobile-android/**'

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/savia-mobile-android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run lint
        run: ./gradlew lintDebug

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: projects/savia-mobile-android/app/build/reports/lint-results-debug.html

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/savia-mobile-android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            projects/savia-mobile-android/app/build/reports/tests/
            projects/savia-mobile-android/domain/build/reports/tests/
            projects/savia-mobile-android/data/build/reports/tests/

  build:
    name: Build Debug APK
    needs: [lint, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/savia-mobile-android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: projects/savia-mobile-android/app/build/outputs/apk/debug/*.apk
